<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mark Rober Videos — Side by Side</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      width: 100%;
      height: 100vh;
    }
    .video-box {
      flex: 1 1 50%;
      position: relative;
      padding-bottom: 28.125%; /* 16:9 ratio but half height */
      height: 0;
      overflow: hidden;
      border: 2px solid #222;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Stack vertically on small screens */
    @media (max-width: 900px) {
      .video-box {
        flex: 1 1 100%;
        padding-bottom: 56.25%;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Jello Pool -->
    <div class="video-box">
      <iframe
        src="https://www.youtube.com/embed/XfVSq5CINuY"
        title="World's Largest Jello Pool — Mark Rober"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <!-- Largest Nerf Gun -->
    <div class="video-box">
      <iframe
        src="https://www.youtube.com/embed/XTX5k7k2u1U"
        title="World's Largest Nerf Gun — Mark Rober"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

  </div>

</body>
</html>
